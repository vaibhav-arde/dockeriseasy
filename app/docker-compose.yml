version: '3.9'

services:
  app:
    # Build from local Dockerfile
    build:
      context: .
      dockerfile: Dockerfile

    # Name the resulting container
    container_name: dockeriseasy

    # Map host port 3000 → container port 3000
    ports:
      - "3000:3000"

    # Environment variables
    environment:
      - NODE_ENV=development
      - PORT=3000

    # Restart policy (useful for dev)
    restart: unless-stopped

    # Health check (mirrors Dockerfile HEALTHCHECK)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
